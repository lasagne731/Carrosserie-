<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Garage Fusion</title>
    <style>
        /* --- STYLE DU MENU PRINCIPAL --- */
        #main-launcher {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: #0f172a; font-family: sans-serif; gap: 25px;
        }
        .launch-card {
            width: 85%; padding: 30px 20px; border-radius: 20px; border: none;
            color: white; font-size: 1.3rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); transition: 0.2s;
        }
        .btn-orange { background: linear-gradient(135deg, #ea580c, #c2410c); }
        .btn-blue { background: linear-gradient(135deg, #2c3e50, #1a252f); }
        .launch-card:active { transform: scale(0.95); }
        
        /* Navigation de retour */
        .btn-back {
            position: fixed; top: 10px; left: 10px; z-index: 99999;
            background: rgba(0,0,0,0.6); color: white; border: 1px solid white;
            padding: 8px 12px; border-radius: 10px; font-size: 12px; display: none;
        }

        .app-container { display: none; width: 100%; min-height: 100vh; }

        /* --- STYLES ORIGINAUX FOURNITURES --- */
        :root {
            --primary-600: #ea580c; --primary-700: #c2410c; --primary-50: #fff7ed;
            --primary-100: #ffedd5; --primary-200: #fed7aa;
        }
        #app-fournitures { background: #f8fafc; color: #0f172a; font-family: sans-serif; }
        .f-header { background: white; padding: 1rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .f-nav { display: flex; overflow-x: auto; gap: 0.5rem; padding: 0.5rem 0; scrollbar-width: none; }
        .f-nav::-webkit-scrollbar { display: none; }
        .f-nav button { padding: 0.5rem 1rem; border-radius: 9999px; border: 1px solid #e2e8f0; background: white; white-space: nowrap; font-size: 0.875rem; font-weight: 500; }
        .f-nav button.active { background: var(--primary-600); color: white; border-color: var(--primary-600); }
        .f-card { background: white; border-radius: 0.75rem; padding: 1rem; margin-bottom: 0.75rem; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
        .f-qty { display: flex; align-items: center; gap: 1rem; }
        .f-btn-qty { width: 2.5rem; height: 2.5rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; background: #f1f5f9; font-size: 1.25rem; font-weight: bold; }
        .f-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 1rem; display: flex; gap: 0.75rem; border-top: 1px solid #e2e8f0; }
        .f-main-btn { flex: 1; padding: 0.75rem; border-radius: 0.5rem; font-weight: 600; text-align: center; }
        .f-btn-share { background: var(--primary-600); color: white; border: none; }
        .f-btn-print { background: #0f172a; color: white; border: none; }
        @media print { .no-print { display: none !important; } #print-content { display: block !important; } body { background: white; } }
        #print-content { display: none; padding: 20px; font-family: monospace; color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>

    <script>
        // --- NAVIGATION ENTRE LES APPLICATIONS ---
        function startApp(appId) {
            // Cache le menu et affiche l'application choisie
            document.getElementById('main-launcher').style.display = 'none';
            document.getElementById('global-back-btn').style.display = 'block';
            document.getElementById('app-' + appId).style.display = 'block';
            
            // Initialise l'appli spécifique si besoin
            if(appId === 'fournitures') initFournitures();
            if(appId === 'ppg') initPPG(); // Sera défini en partie 5
        }

        function exitApp() {
            // Retour au menu principal
            document.getElementById('main-launcher').style.display = 'flex';
            document.getElementById('global-back-btn').style.display = 'none';
            document.querySelectorAll('.app-container').forEach(app => app.style.display = 'none');
        }

        // --- MOTEUR FOURNITURES ---
        let myData = defaultData; 
        let quantities = {};

        function initFournitures() {
            const categories = Object.keys(myData);
            renderTabs(categories);
            renderProducts(categories[0]);
        }

        function renderTabs(cats) {
            const bar = document.getElementById('tab-bar');
            bar.innerHTML = cats.map((c, i) => 
                `<button onclick="setActiveTab(this, '${c}')" class="${i===0?'active':''}">
                    ${c}
                </button>`
            ).join('');
        }

        function setActiveTab(btn, cat) {
            document.querySelectorAll('#tab-bar button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        }

        function renderProducts(cat) {
            const list = document.getElementById('product-list');
            list.innerHTML = myData[cat].map(p => {
                if(!quantities[p.r]) quantities[p.r] = 0;
                return `
                    <div class="f-card">
                        <div>
                            <div style="font-weight:bold">${p.n}</div>
                            <div style="font-size:0.75rem; color:#64748b; font-family:monospace;">${p.r}</div>
                        </div>
                        <div class="f-qty">
                            <button class="f-btn-qty" onclick="updateQty('${p.r}', -1)">-</button>
                            <span id="qty-${p.r}" style="min-width:25px; text-align:center; font-weight:bold; font-size:1.1rem;">${quantities[p.r]}</span>
                            <button class="f-btn-qty" onclick="updateQty('${p.r}', 1)" style="background:var(--primary-100); border-color:var(--primary-200);">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateQty(ref, delta) {
            quantities[ref] = Math.max(0, (quantities[ref] || 0) + delta);
            const el = document.getElementById('qty-' + ref);
            if(el) el.innerText = quantities[ref];
        }

        function resetAll() {
            if(confirm("Voulez-vous effacer toute la commande en cours ?")) {
                quantities = {};
                const activeCat = document.querySelector('#tab-bar button.active').innerText;
                renderProducts(activeCat);
            }
        }

        function shareOrder() {
            let text = "📦 *BON DE COMMANDE FOURNITURES*\n\n";
            let hasItems = false;
            Object.keys(myData).forEach(cat => {
                const items = myData[cat].filter(p => quantities[p.r] > 0);
                if(items.length > 0) {
                    hasItems = true;
                    text += `*--- ${cat} ---*\n`;
                    items.forEach(p => text += `• ${p.n} (${p.r}) x${quantities[p.r]}\n`);
                    text += "\n";
                }
            });

            if(!hasItems) return alert("Votre commande est vide !");
            
            const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        function generatePrint() {
            const pc = document.getElementById('print-content');
            pc.innerHTML = "";
            let empty = true;
            document.getElementById('print-date').innerText = new Date().toLocaleDateString('fr-FR');

            Object.keys(myData).forEach(cat => {
                const items = myData[cat].filter(p => quantities[p.r] > 0);
                if(items.length > 0) {
                    empty = false;
                    let h = `<div style="margin-bottom:20px;">

                    });
                    pc.innerHTML += h + `</tbody></table></div>`;
                }
            });

            if(empty) alert("Rien à imprimer (commande vide)"); else window.print();
        }

    <script>
        let ppgCatalogue = JSON.parse(localStorage.getItem('ppg_data')) || [];
        let ppgBasket = {};

        // Initialisation de l'application PPG
        function initPPG() {
            renderCatalogueManagement();
            renderOrder();
        }

        // Gestion des onglets internes à PPG
        function showTab(tabName) {
            document.querySelectorAll('.ppg-view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('#app-ppg nav button').forEach(b => b.classList.remove('active'));
            
            document.getElementById('view-' + tabName).style.display = 'block';
            document.getElementById('tab-' + tabName).classList.add('active');
            
            if(tabName === 'catalogue') renderCatalogueManagement();
        }

        // Sauvegarde locale
        function savePPG() {
            localStorage.setItem('ppg_data', JSON.stringify(ppgCatalogue));
            renderCatalogueManagement();
        }

        [span_0](start_span)[span_1](start_span)// Recherche dans le catalogue[span_0](end_span)[span_1](end_span)
        function search() {
            const q = document.getElementById('search-input').value.toUpperCase();
            const res = document.getElementById('search-results');
            if(q.length < 1) { res.innerHTML = ""; return; }
            
            const hits = ppgCatalogue.filter(i => {
                const ppgVal = (i.ppg || i.ref_ppg || "").toUpperCase();
                const nomVal = (i.nom || "").toUpperCase();
                return ppgVal.includes(q) || nomVal.includes(q);
            }).slice(0, 15);

            res.innerHTML = hits.map(i => {
                const displayPpg = i.ppg || i.ref_ppg;
                const displayPsa = i.psa || i.ref_psa;
                return `
                    <div class="card" onclick="addToPPGBasket('${displayPpg}')">
                        <div>
                            <strong>${displayPpg}</strong><br>
                            <small>${i.nom}</small>
                        </div>
                        <span style="color:var(--ppg-danger); font-family:monospace; font-weight:bold;">${displayPsa}</span>
                    </div>
                `;
            }).join('');
        }

        [span_2](start_span)[span_3](start_span)// Gestion du panier[span_2](end_span)[span_3](end_span)
        function addToPPGBasket(ppgCode) {
            const item = ppgCatalogue.find(i => (i.ppg === ppgCode || i.ref_ppg === ppgCode));
            if(!item) return;

            const ppg = item.ppg || item.ref_ppg;
            if(ppgBasket[ppg]) {
                ppgBasket[ppg].qty++;
            } else {
                ppgBasket[ppg] = { nom: item.nom, ppg: ppg, psa: item.psa || item.ref_psa, qty: 1 };
            }
            
            document.getElementById('search-input').value = '';
            document.getElementById('search-results').innerHTML = '';
            updateCartCount();
            renderOrder();
            alert("Ajouté : " + item.nom);
        }

        function updatePPGQty(ppg, delta) {
            ppgBasket[ppg].qty += delta;
            if(ppgBasket[ppg].qty <= 0) delete ppgBasket[ppg];
            updateCartCount();
            renderOrder();
        }

        function updateCartCount() {
            const count = Object.keys(ppgBasket).length;
            document.getElementById('cart-count').innerText = count;
        }

        function renderOrder() {
            const container = document.getElementById('cart-items');
            if(Object.keys(ppgBasket).length === 0) {
                container.innerHTML = "<p style='text-align:center; padding:20px; color:#888;'>Le panier est vide</p>";
                return;
            }
            container.innerHTML = Object.keys(ppgBasket).map(ppg => {
                const i = ppgBasket[ppg];
                return `
                    <div class="card">
                        <div>
                            <strong>${i.nom}</strong><br>
                            <small>PPG: ${i.ppg} | PSA: ${i.psa}</small>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <button class="btn-del" onclick="updatePPGQty('${ppg}', -1)">-</button>
                            <strong>${i.qty}</strong>
                            <button class="btn-add" onclick="updatePPGQty('${ppg}', 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function clearCart() {
            if(confirm("Vider le panier ?")) {
                ppgBasket = {};
                updateCartCount();
                renderOrder();
            }
        }

        function shareCart() {
            let text = "*COMMANDE PPG PSA*\n\n";
            let hasItems = false;
            for(let key in ppgBasket) {
                hasItems = true;
                text += `*${ppgBasket[key].nom}*\nPPG: ${ppgBasket[key].ppg}\nPSA: ${ppgBasket[key].psa}\nQté: ${ppgBasket[key].qty}\n\n`;
            }
            if(!hasItems) return alert("Le panier est vide !");
            
            const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        function renderCatalogueManagement() {
            const container = document.getElementById('full-catalogue');
            container.innerHTML = `<h4>Produits (${ppgCatalogue.length})</h4>` + ppgCatalogue.map((item, index) => `
                <div class="card" style="padding:10px; font-size:13px;">
                    <span><b>${item.ppg || item.ref_ppg}</b> - ${item.nom}</span>
                    <button class="btn-del" style="padding:4px 8px; font-size:10px;" onclick="deletePPGProduct(${index})">Suppr.</button>
                </div>
            `).join('');
        }

        function deletePPGProduct(index) {
            if(confirm("Supprimer ce produit ?")) { ppgCatalogue.splice(index, 1); savePPG(); }
        }

        function exportCatalogue() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(ppgCatalogue));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "catalogue_ppg.json");
            dl.click();
        }

        function importCatalogue(event) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(confirm("Ajouter au catalogue actuel ? (Annuler pour remplacer)")) {
                        ppgCatalogue = ppgCatalogue.concat(data);
                    } else { ppgCatalogue = data; }
                    savePPG();
                    alert("Importation réussie !");
                } catch(err) { alert("Erreur de fichier JSON"); }
            };
            reader.readAsText(event.target.files[0]);
        }
    </script>
